name: Android CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create Keystore
        if: secrets.KEYSTORE_BASE64 != ''
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > CerevyaApp/app/cerevya-keystore.jks

      - name: Create keystore.properties
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "storeFile=app/cerevya-keystore.jks" >> CerevyaApp/keystore.properties
          echo "storePassword=Cerevya2024!" >> CerevyaApp/keystore.properties
          echo "keyAlias=cerevya" >> CerevyaApp/keystore.properties
          echo "keyPassword=Cerevya2024!" >> CerevyaApp/keystore.properties

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            CerevyaApp/.gradle/caches
            CerevyaApp/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('CerevyaApp/**/*.gradle*', 'CerevyaApp/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x CerevyaApp/gradlew

      - name: Build Debug APK
        run: cd CerevyaApp && ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cerevya-debug-apk
          path: CerevyaApp/app/build/outputs/apk/debug/app-debug.apk

