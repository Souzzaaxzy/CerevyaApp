name: Android CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            CerevyaApp/.gradle/caches
            CerevyaApp/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('CerevyaApp/**/*.gradle*', 'CerevyaApp/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x CerevyaApp/gradlew

      - name: Build Debug APK
        run: cd CerevyaApp && ./gradlew assembleDebug

      - name: Build Release APK
        run: cd CerevyaApp && ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cerevya-debug-apk
          path: CerevyaApp/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: cerevya-release-apk
          path: CerevyaApp/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CerevyaApp/app/build/outputs/apk/debug/app-debug.apk
            CerevyaApp/app/build/outputs/apk/release/app-release-unsigned.apk
          body: |
            ## Cerevya App - APK Build
            
            📦 **Debug APK**: Pronto para instalação em dispositivos de teste
            🔐 **Release APK**: Versão de produção (unsigned - requer assinatura)
            
            Built on: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

